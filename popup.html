<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
    }
    h2 { margin: 0 0 4px; font-size: 16px; color: #00d4aa; }
    .version { font-size: 11px; color: #888; margin-bottom: 14px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      background: #16213e; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 12px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
    .dot.active { background: #00d4aa; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .btn {
      width: 100%; padding: 10px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: bold;
      cursor: pointer; transition: .2s;
    }
    .btn-on  { background: #00d4aa; color: #1a1a2e; }
    .btn-off { background: #e74c3c; color: #fff; }
    .btn:hover { opacity: .85; }
    .stats {
      display: flex; justify-content: space-between;
      margin-top: 12px; font-size: 12px; color: #aaa;
    }
    .stat-val { font-size: 18px; font-weight: bold; color: #00d4aa; }
    hr { border-color: #333; margin: 12px 0; }
    label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
    textarea {
      width: 100%; height: 70px; background: #16213e;
      border: 1px solid #333; border-radius: 6px;
      color: #eee; font-size: 12px; padding: 6px;
      resize: none; box-sizing: border-box;
    }
    .save-btn {
      margin-top: 6px; padding: 6px 12px;
      background: #333; color: #eee;
      border: none; border-radius: 6px;
      font-size: 12px; cursor: pointer;
    }
    .save-btn:hover { background: #444; }
  </style>
</head>
<body>
  <h2>🎙️ Audio Cleaner</h2>
  <div class="version" id="ver">v0.1.1</div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Inativo</span>
  </div>

  <button class="btn btn-on" id="toggle-btn">▶ Ativar</button>

  <div class="stats">
    <div>
      <div class="stat-val" id="count">0</div>
      <div>vícios removidos</div>
    </div>
    <div>
      <div class="stat-val" id="latency">~300ms</div>
      <div>latência</div>
    </div>
  </div>

  <hr>

  <label>Vícios configurados (um por linha):</label>
  <textarea id="tics">né
né?
então
pessoal
ok
é
e</textarea>
  <button class="save-btn" id="save-btn">💾 Salvar</button>

  <script src="popup.js"></script>
</body>
</html>
